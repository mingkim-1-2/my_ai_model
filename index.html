<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Teachable Machine Pose Model</title>
    <style>
        /* 검정과 멋진 초록색(네온 그린) 테마 적용 */
        body {
            background-color: #121212;
            color: #39FF14; /* 힙한 네온 그린 색상 */
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .title {
            font-size: 2rem; /* 글씨 크게 */
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #39FF14;
        }

        /* 버튼 스타일 */
        button {
            background-color: #39FF14;
            color: #000000;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
        }

        button:hover {
            background-color: #000000;
            color: #39FF14;
            border: 2px solid #39FF14;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.7);
        }

        canvas {
            border: 4px solid #39FF14;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
            margin-bottom: 20px;
        }

        /* 라벨과 도움말 컨테이너 크기 키우기 */
        #label-container {
            font-size: 1.4rem; /* 글씨 크게 */
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.6;
        }

        /* 실시간 도움말 상자 스타일 */
        #help-box {
            background-color: #1e1e1e;
            border: 2px dashed #39FF14;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.3rem;
            color: #ffffff;
            max-width: 400px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(57, 255, 20, 0.2);
        }
        
        .highlight {
            color: #39FF14;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="title">Teachable Machine Pose Model</div>
    <button type="button" onclick="init()">시작하기</button>
    <div><canvas id="canvas"></canvas></div>
    <div id="label-container"></div>
    
    <div id="help-box">시작 버튼을 누르면 자세 가이드가 여기에 표시됩니다.</div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/SYmEOMt_X/";
        let model, webcam, ctx, labelContainer, maxPredictions;
        let helpBox;

        // ★ [중요] 본인의 테러블 머신 클래스명에 맞게 도움말을 수정하세요!
        // 예: 'Class 1' 이라면 'Class 1': '도움말 내용' 으로 작성
        const poseTips = {
            "정상 자세": "아주 좋습니다! 바른 자세를 잘 유지하고 계시네요. 👍",
            "거북목": "목이 앞으로 나왔어요! 어깨를 펴고 턱을 뒤로 당겨주세요. 😮",
            "구부정한 자세": "허리가 굽어있습니다. 등과 허리를 곧게 세워주세요! 🧘",
            "기본": "포즈를 분석 중입니다..."
        };

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmPose.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const size = 300; // 화면이 조금 더 잘 보이도록 캔버스 크기를 300으로 키웠습니다.
            const flip = true; 
            webcam = new tmPose.Webcam(size, size, flip); 
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            const canvas = document.getElementById("canvas");
            canvas.width = size; canvas.height = size;
            ctx = canvas.getContext("2d");
            
            labelContainer = document.getElementById("label-container");
            helpBox = document.getElementById("help-box");
            
            labelContainer.innerHTML = ""; // 초기화
            for (let i = 0; i < maxPredictions; i++) { 
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        async function loop(timestamp) {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);

            let highestClass = "";
            let highestProb = 0;

            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = prediction[i].probability.toFixed(2);
                
                // 화면에 확률 표시
                labelContainer.childNodes[i].innerHTML = `${className}: ${(probability * 100).toFixed(0)}%`;

                // 가장 확률이 높은 포즈 찾기
                if (prediction[i].probability > highestProb) {
                    highestProb = prediction[i].probability;
                    highestClass = className;
                }
            }

            // 가장 높은 확률을 가진 포즈의 도움말을 매칭하여 출력
            if (highestProb > 0.5) { // 50% 이상의 확신이 있을 때만 가이드 변경
                const tip = poseTips[highestClass] || `현재 포즈: <span class="highlight">${highestClass}</span> (도움말을 등록해주세요)`;
                helpBox.innerHTML = tip;
            } else {
                helpBox.innerHTML = "포즈를 명확하게 취해주세요.";
            }

            drawPose(pose);
        }

        function drawPose(pose) {
            if (webcam.canvas) {
                ctx.drawImage(webcam.canvas, 0, 0);
                if (pose) {
                    const minPartConfidence = 0.5;
                    // 스켈레톤 선과 점도 테마에 맞춰 보기 좋게 그려집니다.
                    tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
                    tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
                }
            }
        }
    </script>
</body>
</html>
